<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الراكب · تكسي وين تروح</title>
    <!-- Leaflet CSS/JS (خريطة مفتوحة المصدر) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f1f5f9; }
        .app-header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo-small { font-weight: 800; font-size: 20px; background: linear-gradient(135deg,#f97316,#f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-badge { background: #f1f5f9; padding: 8px 16px; border-radius: 40px; font-size: 14px; font-weight: 500; }
        #map { height: 45vh; width: 100%; border-radius: 28px; margin: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .order-panel {
            background: white;
            border-radius: 32px 32px 0 0;
            padding: 24px 20px 32px;
            margin-top: -20px;
            position: relative;
            box-shadow: 0 -8px 25px rgba(0,0,0,0.05);
        }
        .location-row {
            background: #f8fafc;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .loc-icon { font-size: 24px; }
        .loc-inputs { flex: 1; }
        .loc-inputs input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .service-options {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .service-chip {
            background: #f1f5f9;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .service-chip.active { background: #f97316; color: white; }
        .price-box {
            background: #0f172a;
            color: white;
            padding: 20px;
            border-radius: 32px;
            text-align: center;
            margin: 16px 0;
        }
        .price-number { font-size: 32px; font-weight: 800; }
        .request-btn {
            width: 100%;
            background: #f97316;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            cursor: pointer;
        }
        .status-toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            border-radius: 60px;
            padding: 14px 20px;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>
<div class="app-header">
    <div class="logo-small">🚕 وين تروح</div>
    <div class="user-badge" id="userNameDisplay">راكب</div>
</div>

<div id="map"></div>

<div class="order-panel">
    <div class="location-row">
        <div class="loc-icon">📍</div>
        <div class="loc-inputs">
            <input type="text" id="pickupInput" placeholder="موقعك الحالي" value="المنصور، بغداد">
        </div>
    </div>
    <div class="location-row">
        <div class="loc-icon">🏁</div>
        <div class="loc-inputs">
            <input type="text" id="destInput" placeholder="أين تذهب؟" value="الكرادة">
        </div>
    </div>

    <div class="service-options" id="serviceContainer">
        <div class="service-chip active" data-service="economy">اقتصادي</div>
        <div class="service-chip" data-service="comfort">راحة</div>
        <div class="service-chip" data-service="family">عائلي</div>
    </div>

    <div class="price-box">
        <div>💰 السعر المقدر</div>
        <div class="price-number" id="priceValue">4,500</div>
        <div>دينار عراقي</div>
    </div>

    <button class="request-btn" id="requestRideBtn">📢 اطلب تكسي الآن</button>
</div>

<div id="statusToast" class="status-toast" style="display: none;"></div>

<script>
    // 1. الخريطة الحقيقية (بغداد)
    const map = L.map('map').setView([33.3152, 44.3661], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
    }).addTo(map);
    let marker = L.marker([33.3152, 44.3661]).addTo(map).bindPopup('موقعك');

    // تحديد موقع المستخدم الحقيقي
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map.setView([latitude, longitude], 15);
            marker.setLatLng([latitude, longitude]);
            document.getElementById('pickupInput').value = `موقعي الحالي (${latitude.toFixed(3)}, ${longitude.toFixed(3)})`;
        }, () => console.log("السماح بالموقع لتجربة أفضل"));
    }

    // 2. بيانات المستخدم من تسجيل الدخول
    const user = JSON.parse(localStorage.getItem('taxiUser')) || { name: 'راكب', phone: '0770000000' };
    document.getElementById('userNameDisplay').innerText = user.name || 'مرحباً';

    // 3. اختيار الخدمة
    let currentService = 'economy';
    document.querySelectorAll('.service-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.service-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentService = chip.dataset.service;
            updatePrice();
        });
    });

    function updatePrice() {
        let base = 3000;
        if (currentService === 'comfort') base = 4500;
        if (currentService === 'family') base = 6000;
        document.getElementById('priceValue').innerText = base.toLocaleString();
    }
    updatePrice();

    // 4. طلب التكسي
    const requestBtn = document.getElementById('requestRideBtn');
    const toast = document.getElementById('statusToast');

    requestBtn.addEventListener('click', () => {
        const pickup = document.getElementById('pickupInput').value;
        const dest = document.getElementById('destInput').value;
        if (!dest) { alert('أدخل الوجهة'); return; }

        toast.style.display = 'block';
        toast.innerText = '⏳ جاري البحث عن أقرب سائق...';
        requestBtn.disabled = true;

        // محاكاة البحث عن سائق (بعد 3 ثوانٍ يعثر)
        setTimeout(() => {
            const driverNames = ['أبو رائد', 'حيدر', 'مصطفى', 'علي السعدي'];
            const randomDriver = driverNames[Math.floor(Math.random() * driverNames.length)];
            toast.innerHTML = `✅ تم العثور على سائق: ${randomDriver} · سيارة قادمة خلال 5 دقائق 🚕`;
            setTimeout(() => {
                toast.style.display = 'none';
                requestBtn.disabled = false;
                alert(`السائق ${randomDriver} في طريقه إليك. يمكنك تتبعه على الخريطة (قريباً)`);
            }, 4000);
        }, 2000);
    });
</script>
</body>
  </html>
